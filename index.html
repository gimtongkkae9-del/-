<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; touch-action: none; background: #000; }
    #game-wrap { width:100%; height:100%; position:relative; overflow: hidden; background: radial-gradient(circle at center, #1a1a4e 0%, #050515 100%); }
    
    /* 캐릭터 & 장애물 */
    #player { position:absolute; bottom:160px; width:65px; height:65px; z-index:10; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
    #player img { width: 100%; height: 100%; object-fit: contain; }
    .falling-obj { position:absolute; z-index:5; border-radius: 12px; transform: translateZ(0); }
    
    /* 🔥 고퀄리티 보스 아우라 공격 */
    .boss-attack { 
        position:absolute; width:25px; height:25px; border-radius:50%; 
        background: radial-gradient(circle, #fff 10%, #ffeb3b 30%, #ff5722 60%, transparent 100%);
        z-index:6; 
        box-shadow: 0 0 20px #ff5722, 0 0 40px #ff2200;
        animation: aura-pulse 0.5s infinite alternate;
    }
    @keyframes aura-pulse {
        from { transform: scale(1); filter: brightness(1); }
        to { transform: scale(1.2); filter: brightness(1.5); }
    }
    
    /* UI 레이아웃 */
    #hud { position:absolute; top:15px; left:15px; right:15px; display:flex; justify-content:space-between; z-index:20; font-family:'Black Han Sans',sans-serif; color:#fff; font-size:22px; pointer-events: none; }
    
    /* 조이스틱 */
    #controls { position:absolute; bottom:0; left:0; width:100%; height:140px; background: rgba(0,0,0,0.9); display:flex; justify-content:space-around; align-items:center; z-index:50; border-top: 2px solid #333; }
    .btn-arrow { width: 45%; height: 85%; font-size: 50px; color: white; background: #222; border: 1px solid #444; border-radius: 20px; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .btn-arrow:active { background: #444; }

    /* 오버레이 */
    #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); }
    #start-btn { font-family:'Black Han Sans',sans-serif; font-size:26px; padding:15px 60px; background:linear-gradient(135deg, #ff9f43, #ff6b6b); color:#fff; border-radius:50px; border:none; cursor:pointer; box-shadow:0 10px 20px rgba(255,107,107,0.4); }
    
    .star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:0.3; }
  </style>
 </head>
 <body>
  <div id="game-wrap">
   <div id="stars"></div>
   <audio id="bg-music" loop></audio>
   
   <div id="hud">
    <div id="score-display">점수: 0</div>
    <div id="best-display" style="color: #ffdf00;">최고: 0</div>
   </div>
   
   <div id="player">
    <img src="https://i.ibb.co/hxRSqYCV/25933-removebg-preview.png" alt="강아지">
   </div>
   
   <div id="falling-container"></div>

   <div id="controls">
    <div class="btn-arrow" id="left-btn">◀</div>
    <div class="btn-arrow" id="right-btn">▶</div>
   </div>

   <div id="overlay">
    <h1 style="font-family:'Black Han Sans',sans-serif; font-size:55px; color:#ffdf00; margin-bottom:10px; text-shadow: 0 0 20px rgba(255,223,0,0.5);">준서 피하기</h1>
    <p id="sub-text" style="color:#aaa; margin-bottom:30px; font-size:18px;">최고의 피지컬을 보여주세요!</p>
    <p id="final-score" style="color:#fff; font-size:32px; margin-bottom:25px; display:none; font-family:'Black Han Sans';"></p>
    <button id="start-btn" onclick="startGame()">도전하기</button>
   </div>
  </div>

  <script>
    // 배경음악 설정
    const bgMusic = document.getElementById('bg-music');
    bgMusic.src = 'https://media.vocaroo.com/mp3/11IFKOGShZvj';

    // 별 배경 생성
    const starsEl = document.getElementById('stars');
    for(let i=0; i<50; i++){
      const s = document.createElement('div'); s.className = 'star';
      s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
      starsEl.appendChild(s);
    }

    // 데이터 저장 로직 (Local Storage)
    let best = localStorage.getItem('junseo_best_score') || 0;
    document.getElementById('best-display').textContent = '최고: ' + best;

    let gameRunning = false, score = 0, playerX = 50;
    let animId = null, spawnTimer = null, difficulty = 1;
    let fallingObjects = [], bossAttacks = [], keys = {};

    const player = document.getElementById('player');
    const container = document.getElementById('falling-container');
    const overlay = document.getElementById('overlay');
    const scoreDisp = document.getElementById('score-display');

    function setPlayerPos() {
      const wrapW = document.getElementById('game-wrap').clientWidth;
      playerX = Math.max(0, Math.min(playerX, wrapW - 65));
      player.style.left = playerX + 'px';
    }

    function startGame() {
      score = 0; difficulty = 1;
      playerX = document.getElementById('game-wrap').clientWidth / 2 - 32;
      setPlayerPos();
      
      container.innerHTML = '';
      fallingObjects = [];
      bossAttacks = [];
      scoreDisp.textContent = '점수: 0';
      overlay.style.display = 'none';
      
      // 음악 재생
      bgMusic.currentTime = 0;
      bgMusic.play().catch(() => console.log("음악 자동재생 차단됨"));
      
      gameRunning = true;
      if(spawnTimer) clearInterval(spawnTimer);
      spawnTimer = setInterval(spawnObj, 700);
      gameLoop();
    }

    function spawnObj() {
      if(!gameRunning) return;
      const wrapW = document.getElementById('game-wrap').clientWidth;
      const el = document.createElement('img');
      el.className = 'falling-obj';
      
      const isBoss = Math.random() < 0.2;
      // 이미지 캐싱 고려하여 최적화된 링크 사용
      el.src = isBoss ? 'https://i.ibb.co/216LCs1z/Screenshot-. -Kakao-Talk.jpg' : 'https://i.ibb.co/23J5Sb4v/Screenshot-. -Discord.jpg';
      const size = isBoss ? 110 : 75;
      el.style.width = size + 'px'; el.style.height = size + 'px';
      
      const x = Math.random() * (wrapW - size);
      el.style.left = x + 'px'; el.style.top = '-120px';
      container.appendChild(el);
      
      fallingObjects.push({ 
        el, x, y: -120, size, 
        speed: (4 + Math.random()*2.5) * (1 + difficulty*0.05), 
        isBoss, 
        atkTimer: 0 
      });
    }

    function spawnAttack(x, y) {
      const atkEl = document.createElement('div');
      atkEl.className = 'boss-attack';
      atkEl.style.left = x + 'px';
      atkEl.style.top = y + 'px';
      container.appendChild(atkEl);
      bossAttacks.push({ el: atkEl, x, y, speed: 7.5 });
    }

    function gameLoop() {
      if(!gameRunning) return;

      const moveSpeed = 10;
      if(keys['ArrowLeft'] || keys['l']) playerX -= moveSpeed;
      if(keys['ArrowRight'] || keys['r']) playerX += moveSpeed;
      setPlayerPos();

      const pRect = { x: playerX + 18, y: window.innerHeight - 160 - 55, w: 30, h: 45 };

      // 일반 장애물
      for(let i = fallingObjects.length - 1; i >= 0; i--) {
        const o = fallingObjects[i];
        o.y += o.speed;
        o.el.style.top = o.y + 'px';

        if(o.isBoss) {
          o.atkTimer++;
          if(o.atkTimer > 40) { 
            spawnAttack(o.x + o.size/2 - 12, o.y + o.size - 5);
            o.atkTimer = 0;
          }
        }

        if(pRect.x < o.x + o.size - 15 && pRect.x + pRect.w > o.x + 15 && pRect.y < o.y + o.size - 15 && pRect.y + pRect.h > o.y + 15) {
          endGame(); return;
        }

        if(o.y > window.innerHeight) {
          o.el.remove();
          fallingObjects.splice(i, 1);
          score++;
          scoreDisp.textContent = '점수: ' + score;
          difficulty += 0.02;
        }
      }

      // 보스 아우라 공격 (즉사)
      for(let j = bossAttacks.length - 1; j >= 0; j--) {
        const a = bossAttacks[j];
        a.y += a.speed;
        a.el.style.top = a.y + 'px';

        if(pRect.x < a.x + 25 && pRect.x + pRect.w > a.x && pRect.y < a.y + 25 && pRect.y + pRect.h > a.y) {
          endGame(); return;
        }

        if(a.y > window.innerHeight) {
          a.el.remove();
          bossAttacks.splice(j, 1);
        }
      }

      animId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(animId);
      clearInterval(spawnTimer);
      bgMusic.pause();
      
      // 최고 점수 저장
      if(score > best) {
        best = score;
        localStorage.setItem('junseo_best_score', best);
        document.getElementById('best-display').textContent = '최고: ' + best;
      }

      const fs = document.getElementById('final-score');
      fs.textContent = '최종 점수: ' + score;
      fs.style.display = 'block';
      document.getElementById('sub-text').textContent = '다음엔 꼭 살아남으세요!';
      overlay.style.display = 'flex';
    }

    // 조이스틱 & 키보드 컨트롤
    const handlePress = (key, state) => { keys[key] = state; };
    const lBtn = document.getElementById('left-btn');
    const rBtn = document.getElementById('right-btn');

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    lBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress('l', true); });
    lBtn.addEventListener('touchend', () => handlePress('l', false));
    rBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress('r', true); });
    rBtn.addEventListener('touchend', () => handlePress('r', false));

    lBtn.addEventListener('mousedown', () => handlePress('l', true));
    lBtn.addEventListener('mouseup', () => handlePress('l', false));
    rBtn.addEventListener('mousedown', () => handlePress('r', true));
    rBtn.addEventListener('mouseup', () => handlePress('r', false));
  </script>
 </body>
</html>
