<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; touch-action: none; background: #000; }
    #game-wrap { width:100%; height:100%; position:relative; overflow: hidden; background: radial-gradient(circle at center, #1a1a4e 0%, #050515 100%); }
    
    #player { position:absolute; bottom:160px; width:65px; height:65px; z-index:10; }
    #player img { width: 100%; height: 100%; object-fit: contain; }
    
    .falling-obj { position:absolute; z-index:5; border-radius: 12px; }
    
    /* 보스 아우라 공격 */
    .boss-attack { 
        position:absolute; width:25px; height:25px; border-radius:50%; 
        background: radial-gradient(circle, #fff, #ffeb3b, #ff5722, transparent);
        z-index:6; box-shadow: 0 0 25px #ff5722;
        animation: aura-pulse 0.4s infinite alternate;
    }
    @keyframes aura-pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

    /* 보스 경고 텍스트 */
    #boss-warning { 
        position:absolute; top:20%; left:50%; transform:translateX(-50%);
        color: #ff0000; font-family: 'Black Han Sans'; font-size: 40px;
        text-shadow: 0 0 20px #f00; display:none; z-index:100;
    }

    /* 폭발 VFX */
    .explosion {
        position:absolute; pointer-events:none; z-index:20;
        background: radial-gradient(circle, #fff, #ff9f43, #ff6b6b, transparent);
        border-radius: 50%; animation: explode 0.5s ease-out forwards;
    }
    @keyframes explode {
        0% { transform: scale(0); opacity: 1; filter: brightness(2); }
        100% { transform: scale(4); opacity: 0; filter: brightness(1); }
    }
    
    /* UI & 조이스틱 */
    #hud { position:absolute; top:15px; left:15px; right:15px; z-index:20; font-family:'Black Han Sans',sans-serif; color:#fff; font-size:18px; pointer-events: none; }
    #controls { position:absolute; bottom:0; left:0; width:100%; height:140px; background: rgba(0,0,0,0.9); display:flex; justify-content:space-around; align-items:center; z-index:50; border-top: 2px solid #333; }
    .btn-arrow { width: 45%; height: 85%; font-size: 50px; color: white; background: #222; border-radius: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
    
    /* 랭킹 보드 */
    #ranking-board { margin-top: 15px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 200px; font-size: 14px; text-align: center; }

    #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); }
    #start-btn { font-family:'Black Han Sans',sans-serif; font-size:26px; padding:15px 60px; background:linear-gradient(135deg, #ff9f43, #ff6b6b); color:#fff; border-radius:50px; border:none; cursor:pointer; }
  </style>
 </head>
 <body>
  <div id="game-wrap">
   <div id="stars"></div>
   <audio id="bg-music" loop></audio>
   
   <div id="hud">
    <div style="display:flex; justify-content:space-between;">
        <span id="score-display">점수: 0</span>
        <span id="boss-hp-display" style="color:#ff4444; display:none;">보스 HP: 3</span>
    </div>
   </div>

   <div id="boss-warning">BOSS APPEARED!</div>
   
   <div id="player"><img src="https://i.ibb.co/hxRSqYCV/25933-removebg-preview.png"></div>
   <div id="falling-container"></div>

   <div id="controls">
    <div class="btn-arrow" id="left-btn">◀</div>
    <div class="btn-arrow" id="right-btn">▶</div>
   </div>

   <div id="overlay">
    <h1 style="font-family:'Black Han Sans',sans-serif; font-size:50px; color:#ffdf00;">준서 피하기</h1>
    <div id="ranking-board">
        <div style="margin-bottom:5px; border-bottom:1px solid #555;">🏆 실시간 랭킹</div>
        <div id="rank-list"></div>
    </div>
    <p id="final-score" style="color:#fff; font-size:24px; margin:15px 0; display:none;"></p>
    <button id="start-btn" onclick="startGame()">도전하기</button>
   </div>
  </div>

  <script>
    const bgMusic = document.getElementById('bg-music');
    bgMusic.src = 'https://media.vocaroo.com/mp3/11IFKOGShZvj';

    let gameRunning = false, score = 0, playerX = 50, isBossPhase = false;
    let animId = null, spawnTimer = null, keys = {};
    let fallingObjects = [], bossAttacks = [], bossEntity = null;

    const player = document.getElementById('player');
    const container = document.getElementById('falling-container');
    const overlay = document.getElementById('overlay');
    const scoreDisp = document.getElementById('score-display');
    const bossWarning = document.getElementById('boss-warning');
    const bossHpDisp = document.getElementById('boss-hp-display');

    // 랭킹 시스템
    function updateRanking() {
        let ranks = JSON.parse(localStorage.getItem('junseo_ranks') || "[]");
        ranks.sort((a, b) => b - a);
        const rankList = document.getElementById('rank-list');
        rankList.innerHTML = ranks.slice(0, 5).map((s, i) => `<div>${i+1}위: ${s}점</div>`).join('') || "기록 없음";
    }
    updateRanking();

    function createExplosion(x, y) {
        const exp = document.createElement('div');
        exp.className = 'explosion';
        exp.style.left = x + 'px'; exp.style.top = y + 'px';
        exp.style.width = '50px'; exp.style.height = '50px';
        container.appendChild(exp);
        setTimeout(() => exp.remove(), 500);
    }

    function setPlayerPos() {
        const wrapW = document.getElementById('game-wrap').clientWidth;
        playerX = Math.max(0, Math.min(playerX, wrapW - 65));
        player.style.left = playerX + 'px';
    }

    function startGame() {
        score = 0; isBossPhase = false; bossEntity = null;
        playerX = document.getElementById('game-wrap').clientWidth / 2 - 32;
        container.innerHTML = ''; fallingObjects = []; bossAttacks = [];
        scoreDisp.textContent = '점수: 0'; overlay.style.display = 'none';
        bossHpDisp.style.display = 'none';
        bgMusic.play().catch(() => {});
        gameRunning = true;
        startSpawning();
        gameLoop();
    }

    function startSpawning() {
        if(spawnTimer) clearInterval(spawnTimer);
        spawnTimer = setInterval(() => {
            if(!gameRunning || isBossPhase) return;
            spawnJunseo();
        }, 800);
    }

    function spawnJunseo() {
        const wrapW = document.getElementById('game-wrap').clientWidth;
        const el = document.createElement('img');
        el.className = 'falling-obj';
        el.src = 'https://i.ibb.co/23J5Sb4v/Screenshot-. -Discord.jpg';
        el.style.width = '75px'; el.style.height = '75px';
        const x = Math.random() * (wrapW - 75);
        el.style.left = x + 'px'; el.style.top = '-80px';
        container.appendChild(el);
        fallingObjects.push({ el, x, y: -80, size: 75, speed: 4 + Math.random()*3 });
    }

    function spawnBoss() {
        isBossPhase = true;
        bossWarning.style.display = 'block';
        setTimeout(() => bossWarning.style.display = 'none', 2000);

        const wrapW = document.getElementById('game-wrap').clientWidth;
        const el = document.createElement('img');
        el.className = 'falling-obj';
        el.src = 'https://i.ibb.co/216LCs1z/Screenshot-. -Kakao-Talk.jpg';
        el.style.width = '140px'; el.style.height = '140px';
        el.style.boxShadow = "0 0 30px #f00";
        const x = wrapW / 2 - 70;
        el.style.left = x + 'px'; el.style.top = '-150px';
        container.appendChild(el);
        
        bossEntity = { el, x, y: -150, size: 140, hp: 3, speed: 1.5, atkTimer: 0 };
        bossHpDisp.style.display = 'block';
        bossHpDisp.textContent = `보스 HP: ${bossEntity.hp}`;
    }

    function gameLoop() {
        if(!gameRunning) return;

        if(keys['l']) playerX -= 10;
        if(keys['r']) playerX += 10;
        setPlayerPos();

        const pRect = { x: playerX + 15, y: window.innerHeight - 160 - 55, w: 35, h: 50 };

        // 보스 로직
        if(isBossPhase && bossEntity) {
            bossEntity.y += bossEntity.speed;
            bossEntity.el.style.top = bossEntity.y + 'px';
            
            // 보스 공격
            bossEntity.atkTimer++;
            if(bossEntity.atkTimer > 35) {
                const ax = bossEntity.x + bossEntity.size/2 - 12;
                const ay = bossEntity.y + bossEntity.size - 10;
                const atkEl = document.createElement('div');
                atkEl.className = 'boss-attack';
                atkEl.style.left = ax + 'px'; atkEl.style.top = ay + 'px';
                container.appendChild(atkEl);
                bossAttacks.push({ el: atkEl, x: ax, y: ay, speed: 8 });
                bossEntity.atkTimer = 0;
            }

            // 보스 충돌 (플레이어의 머리가 보스 몸에 닿으면 공격 성공)
            if(pRect.x < bossEntity.x + bossEntity.size - 20 && pRect.x + pRect.w > bossEntity.x + 20 && pRect.y < bossEntity.y + bossEntity.size - 20 && pRect.y + pRect.h > bossEntity.y + 20) {
                bossEntity.hp--;
                createExplosion(bossEntity.x + 40, bossEntity.y + 40);
                bossEntity.y -= 40; // 타격 시 살짝 밀려남
                bossHpDisp.textContent = `보스 HP: ${bossEntity.hp}`;
                if(bossEntity.hp <= 0) {
                    createExplosion(bossEntity.x, bossEntity.y);
                    bossEntity.el.remove();
                    bossEntity = null;
                    isBossPhase = false;
                    bossHpDisp.style.display = 'none';
                    score += 10; // 보스 처치 보너스
                    scoreDisp.textContent = '점수: ' + score;
                }
            }
            if(bossEntity && bossEntity.y > window.innerHeight) endGame();
        }

        // 일반 장애물
        for(let i = fallingObjects.length - 1; i >= 0; i--) {
            const o = fallingObjects[i];
            o.y += o.speed; o.el.style.top = o.y + 'px';
            if(pRect.x < o.x + o.size - 15 && pRect.x + pRect.w > o.x + 15 && pRect.y < o.y + o.size - 15 && pRect.y + pRect.h > o.y + 15) {
                endGame(); return;
            }
            if(o.y > window.innerHeight) {
                o.el.remove(); fallingObjects.splice(i, 1);
                score++;
                scoreDisp.textContent = '점수: ' + score;
                if(!isBossPhase && score > 0 && score % 50 === 0) spawnBoss();
            }
        }

        // 보스 탄환 (즉사)
        for(let j = bossAttacks.length - 1; j >= 0; j--) {
            const a = bossAttacks[j];
            a.y += a.speed; a.el.style.top = a.y + 'px';
            if(pRect.x < a.x + 22 && pRect.x + pRect.w > a.x && pRect.y < a.y + 22 && pRect.y + pRect.h > a.y) {
                endGame(); return;
            }
            if(a.y > window.innerHeight) { a.el.remove(); bossAttacks.splice(j, 1); }
        }

        animId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameRunning = false;
        cancelAnimationFrame(animId);
        clearInterval(spawnTimer);
        bgMusic.pause();
        
        let ranks = JSON.parse(localStorage.getItem('junseo_ranks') || "[]");
        ranks.push(score);
        localStorage.setItem('junseo_ranks', JSON.stringify(ranks));
        updateRanking();

        document.getElementById('final-score').textContent = '최종 점수: ' + score;
        document.getElementById('final-score').style.display = 'block';
        overlay.style.display = 'flex';
    }

    // 컨트롤
    const handle = (k, s) => { keys[k] = s; };
    const l = document.getElementById('left-btn'), r = document.getElementById('right-btn');
    l.ontouchstart = (e) => { e.preventDefault(); handle('l', true); };
    l.ontouchend = () => handle('l', false);
    r.ontouchstart = (e) => { e.preventDefault(); handle('r', true); };
    r.ontouchend = () => handle('r', false);
    l.onmousedown = () => handle('l', true);
    l.onmouseup = () => handle('l', false);
    r.onmousedown = () => handle('r', true);
    r.onmouseup = () => handle('r', false);
  </script>
 </body>
</html>
