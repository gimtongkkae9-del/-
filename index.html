<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; touch-action: none; background: #000; }
    #game-wrap { width:100%; height:100%; position:relative; overflow: hidden; background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%); }
    #player { position:absolute; bottom:140px; width:60px; height:60px; z-index:10; user-select:none; }
    #player img { width: 100%; height: 100%; object-fit: contain; }
    .falling-obj { position:absolute; z-index:5; border-radius: 8px; object-fit: cover; }
    .boss-attack { position:absolute; width:25px; height:25px; border-radius:50%; background:radial-gradient(circle, #ff4444, #ff0000); z-index:6; box-shadow:0 0 15px rgba(255,0,0,.8); }
    #hud { position:absolute; top:12px; left:12px; right:12px; display:flex; justify-content:space-between; z-index:20; font-family:'Black Han Sans',sans-serif; color:#fff; font-size:20px; }
    #controls { position:absolute; bottom:0; left:0; width:100%; height:120px; background: #000; display:flex; justify-content:space-between; align-items:center; padding:0 30px; z-index:50; border-top: 2px solid #333; }
    .btn-arrow { font-size: 50px; color: white; background: none; border: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; background:rgba(0,0,0,.8); backdrop-filter:blur(4px); }
    .star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.5; animation: twinkle 2s infinite alternate; }
    @keyframes twinkle { from{opacity:.2} to{opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  </style>
 </head>
 <body>
  <div id="game-wrap">
   <div id="stars"></div>
   <div id="hud">
    <span id="score-display">점수: 0</span>
    <span id="best-display">최고: 0</span>
   </div>
   
   <div id="player">
    <img src="https://i.ibb.co/hxRSqYCV/25933-removebg-preview.png" alt="강아지">
   </div>
   
   <div id="falling-container"></div>

   <div id="controls">
    <button class="btn-arrow" id="left-btn">《</button>
    <button class="btn-arrow" id="right-btn">》</button>
   </div>

   <div id="overlay">
    <h1 style="font-family:'Black Han Sans',sans-serif; font-size:42px; color:#ffdf00; margin-bottom:10px;">준서 피하기</h1>
    <p id="final-score" style="color:#fff; font-size:24px; margin-bottom:20px; display:none;"></p>
    <button id="start-btn" onclick="startGame()" style="font-family:'Black Han Sans',sans-serif; font-size:22px; padding:12px 40px; background:#ee5a24; color:#fff; border-radius:10px;">시작하기</button>
   </div>
  </div>

  <script>
    // 별 배경 생성
    const starsEl = document.getElementById('stars');
    for(let i=0; i<50; i++){
      const s = document.createElement('div'); s.className = 'star';
      s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
      starsEl.appendChild(s);
    }

    let gameRunning = false, score = 0, best = 0, playerX = 50, animId = null, spawnTimer = null;
    let fallingObjects = [], bossAttacks = [], keys = {};
    const player = document.getElementById('player');
    const container = document.getElementById('falling-container');
    const overlay = document.getElementById('overlay');
    const scoreDisp = document.getElementById('score-display');
    const bestDisp = document.getElementById('best-display');

    const PLAYER_W = 60, OBJ_SIZE = 70;
    let difficulty = 1;

    function setPlayerPos() {
      const wrapW = document.getElementById('game-wrap').clientWidth;
      playerX = Math.max(0, Math.min(playerX, wrapW - PLAYER_W));
      player.style.left = playerX + 'px';
    }

    function startGame() {
      score = 0; difficulty = 1; 
      playerX = document.getElementById('game-wrap').clientWidth / 2 - 30;
      setPlayerPos();
      
      // 초기화
      container.innerHTML = '';
      fallingObjects = [];
      bossAttacks = [];
      scoreDisp.textContent = '점수: 0';
      overlay.style.display = 'none';
      document.getElementById('final-score').style.display = 'none';
      
      gameRunning = true;
      if(spawnTimer) clearInterval(spawnTimer);
      spawnTimer = setInterval(spawnObj, 800);
      gameLoop();
    }

    function spawnObj() {
      if(!gameRunning) return;
      const wrapW = document.getElementById('game-wrap').clientWidth;
      const el = document.createElement('img');
      el.className = 'falling-obj';
      
      // 10% 확률로 보스 등장 (크고 빠르며 공격함)
      const isBoss = Math.random() < 0.15;
      el.src = isBoss ? 'https://i.ibb.co/216LCs1z/Screenshot-. -Kakao-Talk.jpg' : 'https://i.ibb.co/23J5Sb4v/Screenshot-. -Discord.jpg';
      const size = isBoss ? 110 : 75;
      el.style.width = size + 'px'; el.style.height = size + 'px';
      
      const x = Math.random() * (wrapW - size);
      el.style.left = x + 'px'; el.style.top = '-120px';
      container.appendChild(el);
      
      fallingObjects.push({ el, x, y: -120, size, speed: (3 + Math.random()*2) * (1 + difficulty*0.1), isBoss, attackCooldown: 0 });
    }

    function spawnAttack(x, y) {
      const atkEl = document.createElement('div');
      atkEl.className = 'boss-attack';
      atkEl.style.left = x + 'px';
      atkEl.style.top = y + 'px';
      container.appendChild(atkEl);
      bossAttacks.push({ el: atkEl, x, y, speed: 6 });
    }

    function gameLoop() {
      if(!gameRunning) return;

      // 조이스틱 및 키보드 이동
      const moveSpeed = 8;
      if(keys['ArrowLeft'] || keys['leftBtn']) playerX -= moveSpeed;
      if(keys['ArrowRight'] || keys['rightBtn']) playerX += moveSpeed;
      setPlayerPos();

      const pBox = { x: playerX + 10, y: window.innerHeight - 140 - 50, w: PLAYER_W - 20, h: 50 };

      // 장애물 업데이트
      for(let i = fallingObjects.length - 1; i >= 0; i--) {
        const o = fallingObjects[i];
        o.y += o.speed;
        o.el.style.top = o.y + 'px';

        // 보스 공격 로직
        if(o.isBoss) {
          o.attackCooldown++;
          if(o.attackCooldown > 40) {
            spawnAttack(o.x + o.size/2, o.y + o.size);
            o.attackCooldown = 0;
          }
        }

        // 충돌 검사 (장애물)
        if(pBox.x < o.x + o.size - 10 && pBox.x + pBox.w > o.x + 10 && pBox.y < o.y + o.size - 10 && pBox.y + pBox.h > o.y + 10) {
          endGame(); return;
        }

        if(o.y > window.innerHeight) {
          o.el.remove();
          fallingObjects.splice(i, 1);
          score++;
          scoreDisp.textContent = '점수: ' + score;
          difficulty += 0.05;
        }
      }

      // 보스 투사체 업데이트
      for(let j = bossAttacks.length - 1; j >= 0; j--) {
        const a = bossAttacks[j];
        a.y += a.speed;
        a.el.style.top = a.y + 'px';

        // 충돌 검사 (보스 공격에 맞으면 즉시 사망)
        if(pBox.x < a.x + 20 && pBox.x + pBox.w > a.x && pBox.y < a.y + 20 && pBox.y + pBox.h > a.y) {
          endGame(); return;
        }

        if(a.y > window.innerHeight) {
          a.el.remove();
          bossAttacks.splice(j, 1);
        }
      }

      animId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(animId);
      clearInterval(spawnTimer);
      
      if(score > best) {
        best = score;
        bestDisp.textContent = '최고: ' + best;
      }

      player.style.animation = 'shake 0.4s';
      setTimeout(() => player.style.animation = '', 400);

      const fs = document.getElementById('final-score');
      fs.textContent = '최종 점수: ' + score;
      fs.style.display = 'block';
      document.getElementById('start-btn').textContent = '다시 시작';
      overlay.style.display = 'flex';
    }

    // 컨트롤 이벤트
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    const lBtn = document.getElementById('left-btn');
    const rBtn = document.getElementById('right-btn');
    
    lBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['leftBtn'] = true; });
    lBtn.addEventListener('touchend', () => keys['leftBtn'] = false);
    rBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['rightBtn'] = true; });
    rBtn.addEventListener('touchend', () => keys['rightBtn'] = false);
    
    // PC 클릭 대응
    lBtn.addEventListener('mousedown', () => keys['leftBtn'] = true);
    lBtn.addEventListener('mouseup', () => keys['leftBtn'] = false);
    rBtn.addEventListener('mousedown', () => keys['rightBtn'] = true);
    rBtn.addEventListener('mouseup', () => keys['rightBtn'] = false);

  </script>
 </body>
</html>
